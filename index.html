<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>ROBO LEGENDS</title>
  <style>
    body { font-family: Arial, sans-serif; margin:0; }
    nav { background:#1a1f36; color:#fff; padding:14px 24px; display:flex; justify-content:space-between; align-items:center; }
    .hamburger { cursor:pointer; font-size:24px; }
    .side-menu { position:fixed; top:0; right:-260px; width:260px; height:100%; background:#1a1f36; padding:60px 24px; transition:right 0.3s; }
    .side-menu.open { right:0; }
    .side-menu a { display:block; color:#fff; text-decoration:none; margin-bottom:10px; cursor:pointer; }
    .modal { display:none; position:fixed; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.6); }
    .modal-content { background:#fff; margin:10% auto; padding:20px; width:80%; max-width:600px; border-radius:8px; position:relative; }
    .close { position:absolute; right:10px; top:10px; cursor:pointer; font-size:24px; }
    .feedback-btn { background:#222; color:#fff; padding:10px 15px; border:none; border-radius:5px; cursor:pointer; }
  </style>
</head>
<body>
  <nav>
    <span>ROBO LEGENDS</span>
    <div class="hamburger" id="hamburger">☰</div>
  </nav>
  <div class="side-menu" id="sideMenu">
    <a onclick="openModal('bizModal')">Biz Kimiz</a>
    <a onclick="openModal('sunumModal')">Sunumumuz</a>
    <a onclick="openModal('feedbackModal')">Geri Bildirim</a>
  </div>

  <!-- Biz Kimiz Modal -->
  <div id="bizModal" class="modal">
    <div class="modal-content">
      <span class="close" onclick="closeModal('bizModal')">&times;</span>
      <h3>Biz Kimiz</h3>
      <p>Biz First Lego League yarışmasına katılan bir okul robotik takımıyız.</p>
    </div>
  </div>

  <!-- Sunum Modal -->
  <div id="sunumModal" class="modal">
    <div class="modal-content">
      <span class="close" onclick="closeModal('sunumModal')">&times;</span>
      <h3>Sunumumuz</h3>
      <iframe src="https://www.canva.com/design/DAHAeFJJqHQ/view?embed" width="100%" height="300"></iframe>
    </div>
  </div>

  <!-- Feedback Modal -->
  <div id="feedbackModal" class="modal">
    <div class="modal-content">
      <span class="close" onclick="closeModal('feedbackModal')">&times;</span>
      <h3>Geri Bildirim</h3>
      <textarea id="feedbackText" placeholder="Mesajınızı yazın..." style="width:100%;height:120px;"></textarea>
      <button class="feedback-btn" onclick="sendFeedback()">Gönder</button>
      <p id="feedbackResult" style="margin-top:10px;color:#4a6fd4;font-weight:600;"></p>
    </div>
  </div>

<script>
  const hamburger = document.getElementById('hamburger');
  const sideMenu = document.getElementById('sideMenu');

  // Menü aç/kapat
  hamburger.addEventListener('click', () => {
    sideMenu.classList.toggle('open');
  });

  // Menü dışına tıklayınca kapat
  document.addEventListener('click', (e) => {
    if (!sideMenu.contains(e.target) && e.target !== hamburger) {
      sideMenu.classList.remove('open');
    }
  });

  // Modal aç/kapat
  function openModal(id) { document.getElementById(id).style.display = 'block'; }
  function closeModal(id) { document.getElementById(id).style.display = 'none'; }

  // Dışarıya tıklayınca modal kapatma
  window.onclick = function(event) {
    ['bizModal','sunumModal','feedbackModal'].forEach(id => {
      const modal = document.getElementById(id);
      if (event.target === modal) modal.style.display = 'none';
    });
  };

  // Feedback gönderme
  async function sendFeedback() {
    const text = document.getElementById('feedbackText').value.trim();
    const result = document.getElementById('feedbackResult');

    if (!text) {
      result.textContent = "Lütfen bir mesaj yazın.";
      return;
    }

    try {
      const response = await fetch("http://localhost:3000/feedback", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: text })
      });

      if (response.ok) {
        result.textContent = "Mesajınız GitHub Issues'a gönderildi!";
        document.getElementById('feedbackText').value = "";
      } else {
        const error = await response.json();
        result.textContent = "Hata: " + (error.message || "Gönderilemedi");
      }
    } catch (err) {
      result.textContent = "Bağlantı hatası: " + err.message;
    }
  }
</script>
</body>
</html>
